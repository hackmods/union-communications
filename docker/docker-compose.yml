services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-unionops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env}
      POSTGRES_DB: ${POSTGRES_DB:-unionops}
      # Password for non-owner app role (RLS). Init script syncs on first volume create;
      # after that: docker compose exec db psql -U unionops -c "ALTER ROLE unionops_app PASSWORD '…'"
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER:-unionops_app}
    volumes:
      - unionops_pgdata:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-unionops} -d ${POSTGRES_DB:-unionops}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    # Prefer a release image when available:
    # image: ghcr.io/hackmods/union-communications:v0.1.0
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_OFFICER_HUB_PUBLIC: "true"
        NEXT_PUBLIC_DEMO_SITE: "true"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Required — compose fails if unset (SEC-004). Generate: openssl rand -base64 32
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in docker/.env — openssl rand -base64 32}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      # Demo compose: shared static code (SEC-002). Prefer AUTH_MFA_MODE=totp on real hosts.
      AUTH_MFA_MODE: ${AUTH_MFA_MODE:-shared_code_insecure}
      AUTH_MFA_CODE: ${AUTH_MFA_CODE:?Set AUTH_MFA_CODE to a 6-digit shared code for this demo host}
      POSTGRES_USER: ${POSTGRES_USER:-unionops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in docker/.env}
      POSTGRES_DB: ${POSTGRES_DB:-unionops}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD:-}
      # Owner URL for drizzle-kit migrate (table owner bypasses RLS — required for DDL).
      MIGRATE_DATABASE_URL: ${MIGRATE_DATABASE_URL:-postgres://${POSTGRES_USER:-unionops}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-unionops}}
      # Runtime URL: prefer unionops_app when POSTGRES_APP_PASSWORD is set (RLS binds).
      # Demo fallback uses table owner when app password unset (RLS bypassed — not for production casework).
      DATABASE_URL: ${DATABASE_URL:-postgres://unionops_app:${POSTGRES_APP_PASSWORD:-${POSTGRES_PASSWORD}}@db:5432/${POSTGRES_DB:-unionops}}
      # Flip modules to postgres once migrations + seed are verified for this host.
      # Demo default remains memory so a fresh compose still boots without seed.
      GRIEVANCE_DB_BACKEND: ${GRIEVANCE_DB_BACKEND:-memory}
      BUMPING_DB_BACKEND: ${BUMPING_DB_BACKEND:-memory}
      AUDIT_DB_BACKEND: ${AUDIT_DB_BACKEND:-memory}
      TIME_DB_BACKEND: ${TIME_DB_BACKEND:-memory}
      ATTACHMENTS_DB_BACKEND: ${ATTACHMENTS_DB_BACKEND:-memory}
      DISCUSSIONS_DB_BACKEND: ${DISCUSSIONS_DB_BACKEND:-memory}
      TASKS_DB_BACKEND: ${TASKS_DB_BACKEND:-memory}
      INFORMAL_LOG_DB_BACKEND: ${INFORMAL_LOG_DB_BACKEND:-memory}
      MINUTES_DB_BACKEND: ${MINUTES_DB_BACKEND:-memory}
      AUTH_USERS_BACKEND: ${AUTH_USERS_BACKEND:-memory}

volumes:
  unionops_pgdata:
