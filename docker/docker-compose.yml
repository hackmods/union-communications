services:
  web:
    # Prefer a release image when available:
    # image: ghcr.io/hackmods/union-communications:v0.1.0
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_OFFICER_HUB_PUBLIC: "true"
        NEXT_PUBLIC_DEMO_SITE: "true"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Replace before any shared or production deploy
      AUTH_SECRET: local-docker-auth-secret-change-me
      AUTH_URL: http://localhost:3000
