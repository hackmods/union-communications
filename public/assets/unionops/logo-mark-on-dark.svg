<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="UnionOps">
  <title>UnionOps (on dark)</title>
  <desc>Interlocking u and o — graphics accent u, primary o — for dark backgrounds.</desc>
  <!-- O (behind) -->
  <circle
    cx="44"
    cy="34"
    r="14"
    fill="none"
    stroke="#C2410C"
    stroke-width="10"
  />
  <!-- U (overlap) -->
  <path
    d="M12 14v20a14 14 0 0 0 28 0V14"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="10"
    stroke-linecap="butt"
    stroke-linejoin="round"
    opacity="0.88"
  />
</svg>
