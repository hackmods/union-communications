name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        env:
          AUTH_SECRET: ci-build-secret-not-for-production
        run: npm run build

      - name: Install Playwright browsers
        run: |
          # ubuntu-latest ships Microsoft apt feeds that can break `apt update` (NOSPLIT / unsigned).
          sudo rm -f /etc/apt/sources.list.d/microsoft*.list \
            /etc/apt/sources.list.d/microsoft*.sources \
            /etc/apt/sources.list.d/azure-cli* 2>/dev/null || true
          npx playwright install chromium --with-deps

      - name: E2E smoke
        env:
          CI: "true"
          AUTH_SECRET: ci-build-secret-not-for-production
        run: npm run test:smoke

      - name: Docker build smoke
        run: docker build -f docker/Dockerfile -t union-communications:ci .

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

  deploy:
    needs: test-and-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync main branch for CapRover
        run: git push origin HEAD:main

      - name: Trigger CapRover build
        env:
          CAPROVER_WEBHOOK_URL: ${{ secrets.CAPROVER_WEBHOOK_URL }}
        run: |
          if [ -z "$CAPROVER_WEBHOOK_URL" ]; then
            echo "::warning::CAPROVER_WEBHOOK_URL not set — skipping deploy trigger. Set it once the CapRover app exists."
            exit 0
          fi
          curl -fsS -X POST "$CAPROVER_WEBHOOK_URL"
          echo "CapRover build triggered."
